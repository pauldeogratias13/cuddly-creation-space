name: Nexus Android Cloud Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Corepack
        run: corepack enable

      - name: Activate PNPM
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Generate Native Android Folder
        run: pnpm --filter @nexus/mobile exec expo prebuild --platform android --non-interactive

      - name: Build Debug APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Firebase Test Lab Robo Test
        run: |
          gcloud firebase test android run \
            --type robo \
            --app apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
            --device model=Pixel2,version=30,locale=en,orientation=portrait